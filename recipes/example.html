<!doctype html>
<!--
  Archie viewer — the canonical "here is how" example
  ===================================================
  One complete, minimal, standalone page that embeds <archie-viewer> with a hosted
  library (src) and opens it straight to a specific note (target). Open this file in a
  browser, swap the placeholder URLs, and ship.

  THE CONTRACT (ADR-0021 — frozen public API, three attributes only):
    src     hosted .archie.zip URL | published-tree base URL | absent -> local drop screen
    target  native-route address (the exact hash the viewer shows in its address bar):
              Exhibit        #/{slug}
              Object         #/{slug}/o/<objectId>
              Note           #/{slug}/a/<logicalId>
              Note + region  #/{slug}/a/<logicalId>?xywh=x,y,w,h
              Section        #/{slug}/s/<sectionId>
            An unresolvable target DEGRADES UPWARD, never errors.
    offline boolean; present blocks all remote tile/media fetch (kiosk / air-gapped).

  REPLACE (if you fork):
    micahchoo.github.io/Archie  ->  your published tree base
    voynich                      ->  your exhibit slug
    n3                           ->  your note logicalId
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archie viewer — example</title>
  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    archie-viewer { display: block; width: 100%; height: 100%; }
  </style>

  <!-- 1. Load the runtime once, from jsDelivr serving the pinned @v1 git tag. -->
  <script
    type="module"
    src="https://cdn.jsdelivr.net/gh/micahchoo/Archie@v1.1/dist/archie-viewer.js"
    crossorigin="anonymous"></script>
</head>

<body>

  <!-- 2. One element. src = the published library; target = open to object o1.
          An object target resolves directly against the published tree (the PRIMARY
          working deep-link). For a note-level target use #/voynich/a/<logicalId> —
          note-level deep-link — resolves only when the published annotations carry a
          bare logicalId (slash-free); otherwise degrades to the object. -->
  <!-- replace with your own published-tree base URL if you fork -->
  <archie-viewer
    src="https://micahchoo.github.io/Archie/viewer/published/"
    target="#/voynich/o/o1"></archie-viewer>

  <!-- IIIF Content State variant (new, additive interop) — uncomment to use INSTEAD of
       `target`. Point an IIIF Presentation 3 Content State (base64url) at the embed; it is
       decoded by @render/core deeplink.ts. The native `target` route stays primary.

  <archie-viewer
    src="https://micahchoo.github.io/Archie/viewer/published/"
    iiif-content="JTdCJTIyJTQwY29udGV4dCUyMi..."></archie-viewer>
  -->

</body>
</html>
