<!doctype html>
<!--
  Recipe 04 — Deep-link to a specific place (the target attribute)
  ===============================================================
  Scenario: you want the embed to OPEN to a specific note or a specific object, not the
  gallery. The `target` attribute is a native-route address — the EXACT string the viewer
  shows in its own address bar. Open the location in the standalone viewer, copy the hash
  from the address bar, paste it as `target`. It carries the full cite ladder:

    Exhibit         #/{slug}
    Object          #/{slug}/o/<objectId>
    Note            #/{slug}/a/<logicalId>
    Note + region   #/{slug}/a/<logicalId>?xywh=x,y,w,h
    Section         #/{slug}/s/<sectionId>      (new route grammar)

  DEGRADE-UPWARD (ADR-0021): a target that can't be resolved NEVER errors — it falls back
  upward. Missing note -> its exhibit; missing region -> the whole object; out-of-range
  section -> nearest valid section; missing exhibit -> the gallery. The visitor always
  sees something.

  Contract: ADR-0021 (target = full cite-ladder native-route address + degrade-upward).
  Delivered by: Phase 3 (target ladder + degrade-upward).

  Two live examples below. They share one library (src) and differ only in `target`.

  REPLACE (if you fork):
    micahchoo.github.io/Archie  ->  your published tree base
    voynich                      ->  your exhibit slug
    n3 / obj-folio-1             ->  your note logicalId / objectId
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archie viewer — deep links</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    section { padding: 1rem 1.25rem; }
    archie-viewer { display: block; width: 100%; height: 70vh; margin-top: .5rem; }
    h2 { margin: 0; } code { background: #f3f3f3; padding: .1em .35em; border-radius: 3px; }
  </style>

  <script
    type="module"
    src="https://cdn.jsdelivr.net/gh/micahchoo/Archie@v1.1/dist/archie-viewer.js"
    crossorigin="anonymous"></script>
</head>

<body>

  <!-- EXAMPLE A: open straight to a specific OBJECT (a whole item in the exhibit).
       target = #/{slug}/o/{objectId}. This is the PRIMARY working deep-link — an object id
       resolves directly against the published tree. -->
  <section>
    <h2>A — Land on an object</h2>
    <p>target = <code>#/voynich/o/o1</code></p>
    <!-- replace with your own published-tree base URL if you fork -->
    <archie-viewer
      src="https://micahchoo.github.io/Archie/viewer/published/"
      target="#/voynich/o/o1"></archie-viewer>
  </section>

  <!-- EXAMPLE B: open straight to a specific NOTE.
       target = #/{slug}/a/{logicalId}. Append ?xywh=x,y,w,h to also frame a sub-region.

       note-level deep-link — resolves only when the published annotations carry a bare
       logicalId (slash-free); otherwise degrades to the object. Uncomment to try:

  <section>
    <h2>B — Land on a note</h2>
    <p>target = <code>#/voynich/a/n3</code></p>
    <archie-viewer
      src="https://micahchoo.github.io/Archie/viewer/published/"
      target="#/voynich/a/n3"></archie-viewer>
  </section>
  -->

</body>
</html>
